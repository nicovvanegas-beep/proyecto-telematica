# ============================================================
# docker-compose.yml — Orquestación de servicios
# Proyecto Final Telemática
#
# Uso:
#   Levantar:  docker-compose up -d
#   Detener:   docker-compose down
#   Logs:      docker-compose logs -f
#   Rebuild:   docker-compose up -d --build
# ============================================================

version: '3.8'

services:

  # ── Servicio 1: Aplicación Flask/Gunicorn ──────────────────
  web:
    build:
      context: .                  # usa el Dockerfile en la raíz del proyecto
      dockerfile: Dockerfile
    container_name: telematica_web
    restart: unless-stopped       # reinicia automáticamente si el contenedor falla
    volumes:
      # Volumen persistente para la base de datos SQLite
      # (los datos sobreviven aunque el contenedor se reinicie)
      - db_data:/app/data
    networks:
      - app_network
    # "web" no expone puertos al host directamente — todo pasa por Nginx
    expose:
      - "5000"
    environment:
      # Variables de entorno para Flask
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Servicio 2: Nginx (reverse proxy) ──────────────────────
  nginx:
    image: nginx:alpine            # imagen oficial de Nginx, variante liviana
    container_name: telematica_nginx
    restart: unless-stopped
    ports:
      - "80:80"                    # expone el puerto 80 al host (internet)
    volumes:
      # Montar configuración personalizada de Nginx
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Montar archivos estáticos para que Nginx los sirva directamente
      - ./app/static:/app/static:ro
    depends_on:
      web:
        condition: service_healthy # espera a que el servicio web esté saludable
    networks:
      - app_network

# ── Redes ────────────────────────────────────────────────────
networks:
  app_network:
    driver: bridge                 # red interna entre contenedores

# ── Volúmenes ────────────────────────────────────────────────
volumes:
  db_data:
    driver: local                  # almacenado localmente en el servidor
