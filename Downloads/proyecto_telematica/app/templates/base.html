<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Proyecto Telemática{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Barra de navegación principal -->
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="/">🖥️ TelematicaApp</a>
            <ul class="nav-links">
                <li><a href="/">Inicio</a></li>
                <li><a href="/servicios">Servicios</a></li>
                <li><a href="/contacto">Contacto</a></li>
                <li><a href="/api/status" target="_blank">API Status</a></li>
            </ul>
        </div>
    </nav>

    <!-- Contenido principal de cada página -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Pie de página -->
    <footer class="footer">
        <div class="container">
            <p>© 2025 Proyecto Final — Telemática | Ingeniería en Sistemas e Informática</p>
            <p>Desplegado con Docker + AWS EC2</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
