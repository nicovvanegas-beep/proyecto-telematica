# ============================================================
# nginx/nginx.conf — Configuración de Nginx como reverse proxy
# Proyecto Final Telemática
# ============================================================

# Worker processes: auto ajusta al número de CPUs disponibles
worker_processes auto;

events {
    worker_connections 1024;   # conexiones simultáneas por worker
}

http {

    # Tipos MIME estándar
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Optimizaciones de transferencia
    sendfile on;
    keepalive_timeout 65;

    # ── Upstream: la app Flask/Gunicorn ──────────────────────
    # "web" es el nombre del servicio en docker-compose.yml
    upstream flask_app {
        server web:5000;
    }

    # ── Servidor virtual principal ───────────────────────────
    server {
        listen 80;                  # escucha en el puerto 80 (HTTP)
        server_name _;              # acepta cualquier dominio/IP

        # Tamaño máximo de body (para uploads futuros)
        client_max_body_size 10M;

        # Ruta principal: redirige todo a la app Flask
        location / {
            proxy_pass         http://flask_app;

            # Headers necesarios para que Flask conozca la IP real del cliente
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts razonables
            proxy_connect_timeout 30s;
            proxy_read_timeout    30s;
        }

        # Los archivos estáticos los sirve Nginx directamente
        # (más eficiente que pasarlos por Flask/Gunicorn)
        location /static/ {
            alias /app/static/;
            expires 30d;            # caché del navegador por 30 días
            add_header Cache-Control "public, immutable";
        }

        # Endpoint de health check para load balancers
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
